{% extends "base.html" %}
{% block title %}ZQ-Trade 模拟交易{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-800">模拟交易</h1>
  <div class="flex gap-3">
    <button class="btn btn-danger btn-sm" onclick="resetAccount()">重置账户</button>
  </div>
</div>

<!-- 账户概览 -->
<div class="grid grid-cols-4 gap-4 mb-6" id="account-cards">
  <div class="bg-white rounded-lg shadow-sm p-4">
    <div class="text-sm text-gray-500 mb-1">当前净值</div>
    <div class="text-2xl font-bold" id="card-capital">$0</div>
  </div>
  <div class="bg-white rounded-lg shadow-sm p-4">
    <div class="text-sm text-gray-500 mb-1">总盈亏</div>
    <div class="text-2xl font-bold" id="card-pnl">$0</div>
  </div>
  <div class="bg-white rounded-lg shadow-sm p-4">
    <div class="text-sm text-gray-500 mb-1">胜率</div>
    <div class="text-2xl font-bold" id="card-winrate">0%</div>
  </div>
  <div class="bg-white rounded-lg shadow-sm p-4">
    <div class="text-sm text-gray-500 mb-1">最大回撤</div>
    <div class="text-2xl font-bold text-red-600" id="card-drawdown">0%</div>
  </div>
</div>

<div class="grid grid-cols-4 gap-4 mb-6">
  <div class="bg-white rounded-lg shadow-sm p-4">
    <div class="text-sm text-gray-500 mb-1">初始资金</div>
    <div class="text-lg font-bold text-gray-600" id="card-initial">$100,000</div>
  </div>
  <div class="bg-white rounded-lg shadow-sm p-4">
    <div class="text-sm text-gray-500 mb-1">总交易数</div>
    <div class="text-lg font-bold" id="card-trades">0</div>
  </div>
  <div class="bg-white rounded-lg shadow-sm p-4">
    <div class="text-sm text-gray-500 mb-1">盈亏比</div>
    <div class="text-lg font-bold" id="card-pf">0</div>
  </div>
  <div class="bg-white rounded-lg shadow-sm p-4">
    <div class="text-sm text-gray-500 mb-1">持仓数</div>
    <div class="text-lg font-bold" id="card-positions">0/5</div>
  </div>
</div>

<!-- Tabs -->
<div class="flex gap-1 mb-4 border-b">
  <button class="tab-btn active" data-tab="positions" onclick="switchTab('positions')">当前持仓</button>
  <button class="tab-btn" data-tab="history" onclick="switchTab('history')">历史订单</button>
</div>

<!-- 持仓表格 -->
<div id="positions-panel">
  <div class="bg-white rounded-lg shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-gray-600">
        <tr>
          <th class="px-4 py-3 text-left">代码</th>
          <th class="px-4 py-3 text-left">名称</th>
          <th class="px-4 py-3 text-center">方向</th>
          <th class="px-4 py-3 text-right">数量</th>
          <th class="px-4 py-3 text-right">开仓价</th>
          <th class="px-4 py-3 text-right">现价</th>
          <th class="px-4 py-3 text-right">止损</th>
          <th class="px-4 py-3 text-right">止盈</th>
          <th class="px-4 py-3 text-right">浮动盈亏</th>
          <th class="px-4 py-3 text-center">操作</th>
        </tr>
      </thead>
      <tbody id="positions-body"></tbody>
    </table>
    <div id="positions-empty" class="hidden p-8 text-center text-gray-400">暂无持仓</div>
  </div>
</div>

<!-- 历史订单表格 -->
<div id="history-panel" class="hidden">
  <div class="bg-white rounded-lg shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-gray-600">
        <tr>
          <th class="px-4 py-3 text-left">日期</th>
          <th class="px-4 py-3 text-left">代码</th>
          <th class="px-4 py-3 text-center">方向</th>
          <th class="px-4 py-3 text-right">开仓价</th>
          <th class="px-4 py-3 text-right">平仓价</th>
          <th class="px-4 py-3 text-right">盈亏</th>
          <th class="px-4 py-3 text-right">盈亏%</th>
          <th class="px-4 py-3 text-center">原因</th>
        </tr>
      </thead>
      <tbody id="history-body"></tbody>
    </table>
    <div id="history-empty" class="hidden p-8 text-center text-gray-400">暂无历史订单</div>
  </div>
</div>

<style>
  .tab-btn { padding: 10px 20px; font-size: 14px; color: #6b7280; border-bottom: 2px solid transparent; cursor: pointer; background: none; border-top: none; border-left: none; border-right: none; }
  .tab-btn:hover { color: #1f2937; }
  .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
  .pnl-pos { color: #10b981; }
  .pnl-neg { color: #ef4444; }
</style>
{% endblock %}

{% block scripts %}
<script>
let currentTab = 'positions';
let summaryData = null;

async function loadSummary() {
  try {
    summaryData = await api('/api/trading/summary');
    renderCards();
    renderPositions();
    renderHistory();
  } catch(e) { showToast(e.message, 'error'); }
}

function renderCards() {
  if (!summaryData) return;
  const a = summaryData.account;
  const pnl = a.total_pnl + summaryData.unrealized_pnl;
  const pnlClass = pnl >= 0 ? 'pnl-pos' : 'pnl-neg';

  document.getElementById('card-capital').textContent = '$' + a.current_capital.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0});
  document.getElementById('card-capital').className = 'text-2xl font-bold';

  const pnlEl = document.getElementById('card-pnl');
  pnlEl.textContent = (pnl >= 0 ? '+$' : '-$') + Math.abs(pnl).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  pnlEl.className = 'text-2xl font-bold ' + pnlClass;

  document.getElementById('card-winrate').textContent = summaryData.win_rate + '%';
  document.getElementById('card-drawdown').textContent = a.max_drawdown + '%';
  document.getElementById('card-initial').textContent = '$' + a.initial_capital.toLocaleString();
  document.getElementById('card-trades').textContent = a.total_trades;
  document.getElementById('card-pf').textContent = summaryData.profit_factor;
  document.getElementById('card-positions').textContent = summaryData.open_count + '/' + summaryData.max_positions;
}

function renderPositions() {
  const tbody = document.getElementById('positions-body');
  const empty = document.getElementById('positions-empty');
  const positions = summaryData ? summaryData.positions : [];

  if (positions.length === 0) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  tbody.innerHTML = positions.map(p => {
    const pnlClass = (p.unrealized_pnl || 0) >= 0 ? 'pnl-pos' : 'pnl-neg';
    const pnlSign = (p.unrealized_pnl || 0) >= 0 ? '+' : '';
    return `
      <tr class="border-t hover:bg-gray-50">
        <td class="px-4 py-3 font-mono font-bold">${p.symbol}</td>
        <td class="px-4 py-3 text-gray-600">${p.symbol_name || '-'}</td>
        <td class="px-4 py-3 text-center"><span class="tag tag-${p.direction==='long'?'S':'C'}">${p.direction==='long'?'多':'空'}</span></td>
        <td class="px-4 py-3 text-right">${p.quantity}</td>
        <td class="px-4 py-3 text-right font-mono">$${p.price.toFixed(2)}</td>
        <td class="px-4 py-3 text-right font-mono">$${(p.current_price||p.price).toFixed(2)}</td>
        <td class="px-4 py-3 text-right font-mono text-red-500">${p.stop_loss ? '$'+p.stop_loss.toFixed(2) : '-'}</td>
        <td class="px-4 py-3 text-right font-mono text-green-500">${p.take_profit ? '$'+p.take_profit.toFixed(2) : '-'}</td>
        <td class="px-4 py-3 text-right font-mono ${pnlClass}">${pnlSign}$${Math.abs(p.unrealized_pnl||0).toFixed(2)} (${pnlSign}${(p.unrealized_pnl_pct||0).toFixed(1)}%)</td>
        <td class="px-4 py-3 text-center">
          <button class="btn btn-danger btn-sm" onclick="closePosition('${p.id}')">平仓</button>
        </td>
      </tr>
    `;
  }).join('');
}

function renderHistory() {
  const tbody = document.getElementById('history-body');
  const empty = document.getElementById('history-empty');
  const history = summaryData ? summaryData.history : [];

  if (history.length === 0) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  const reasonLabels = {stop_loss:'止损', take_profit:'止盈', manual:'手动', signal:'信号'};
  tbody.innerHTML = history.map(h => {
    const pnlClass = (h.pnl || 0) >= 0 ? 'pnl-pos' : 'pnl-neg';
    const pnlSign = (h.pnl || 0) >= 0 ? '+' : '';
    return `
      <tr class="border-t hover:bg-gray-50">
        <td class="px-4 py-3 text-xs text-gray-500">${formatTime(h.close_time)}</td>
        <td class="px-4 py-3 font-mono font-bold">${h.symbol}</td>
        <td class="px-4 py-3 text-center"><span class="tag tag-${h.direction==='long'?'S':'C'}">${h.direction==='long'?'多':'空'}</span></td>
        <td class="px-4 py-3 text-right font-mono">$${h.price.toFixed(2)}</td>
        <td class="px-4 py-3 text-right font-mono">$${(h.close_price||0).toFixed(2)}</td>
        <td class="px-4 py-3 text-right font-mono ${pnlClass}">${pnlSign}$${Math.abs(h.pnl||0).toFixed(2)}</td>
        <td class="px-4 py-3 text-right font-mono ${pnlClass}">${pnlSign}${(h.pnl_pct||0).toFixed(1)}%</td>
        <td class="px-4 py-3 text-center text-xs">${reasonLabels[h.close_reason]||h.close_reason||'-'}</td>
      </tr>
    `;
  }).join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('positions-panel').classList.toggle('hidden', tab !== 'positions');
  document.getElementById('history-panel').classList.toggle('hidden', tab !== 'history');
}

async function closePosition(orderId) {
  if (!confirm('确认平仓？')) return;
  try {
    const r = await api('/api/trading/close', {
      method: 'POST',
      body: JSON.stringify({order_id: orderId, reason: 'manual'})
    });
    showToast(`已平仓, PnL: $${r.pnl}`);
    loadSummary();
  } catch(e) { showToast(e.message, 'error'); }
}

async function resetAccount() {
  if (!confirm('确认重置模拟账户？所有持仓和历史订单将被清除。')) return;
  try {
    await api('/api/trading/reset', {method:'POST'});
    showToast('账户已重置');
    loadSummary();
  } catch(e) { showToast(e.message, 'error'); }
}

function formatTime(t) {
  if (!t) return '-';
  const d = new Date(t);
  return `${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

// 初始加载，30s刷新
loadSummary();
setInterval(loadSummary, 30000);
</script>
{% endblock %}
