{% extends "base.html" %}
{% block title %}批次列表 - ZQ-Trade{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-800">分析批次</h1>
  <button class="btn btn-primary" onclick="openCreateModal()">+ 新建批次</button>
</div>

<div id="batch-list" class="space-y-3">
  <div class="text-gray-400 text-center py-12">加载中...</div>
</div>

<!-- 创建弹窗 -->
<div id="create-modal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-50" style="display:none">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-lg mx-4">
    <h2 class="text-lg font-bold mb-4">新建分析批次</h2>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-600 mb-1">批次名称（可选）</label>
      <input type="text" id="batch-name" class="w-full" placeholder="如：3月9日晚间扫描">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-600 mb-1">股票代码（每行一个，或用逗号/空格分隔）</label>
      <textarea id="batch-symbols" rows="6" class="w-full font-mono" placeholder="603817&#10;600802&#10;02610&#10;HIMS"></textarea>
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-600 mb-1">截止日期（可选，默认今天）</label>
      <input type="text" id="batch-end-date" class="w-full" placeholder="YYYY-MM-DD">
    </div>
    <div class="flex justify-end gap-3">
      <button class="btn btn-ghost" onclick="closeCreateModal()">取消</button>
      <button class="btn btn-primary" id="btn-create" onclick="createBatch()">创建并分析</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function openCreateModal() {
  const m = document.getElementById('create-modal');
  m.style.display = 'flex';
}
function closeCreateModal() {
  document.getElementById('create-modal').style.display = 'none';
}

async function createBatch() {
  const name = document.getElementById('batch-name').value.trim();
  const raw = document.getElementById('batch-symbols').value.trim();
  const endDate = document.getElementById('batch-end-date').value.trim() || null;

  const symbols = raw.split(/[\n,\s\/]+/).map(s => s.trim()).filter(s => s);
  if (symbols.length === 0) { showToast('请输入股票代码', 'error'); return; }

  const btn = document.getElementById('btn-create');
  btn.disabled = true; btn.textContent = '创建中...';

  try {
    const batch = await api('/api/batches', {
      method: 'POST',
      body: JSON.stringify({ name, symbols, end_date: endDate })
    });
    // 触发分析
    await api('/api/batches/' + batch.id + '/analyze', { method: 'POST' });
    closeCreateModal();
    showToast('批次已创建，分析进行中');
    loadBatches();
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '创建并分析';
  }
}

async function deleteBatch(id) {
  if (!confirm('确定删除此批次？')) return;
  try {
    await api('/api/batches/' + id, { method: 'DELETE' });
    showToast('已删除');
    loadBatches();
  } catch(e) { showToast(e.message, 'error'); }
}

async function reanalyze(id) {
  try {
    await api('/api/batches/' + id + '/analyze', { method: 'POST' });
    showToast('重新分析已启动');
    loadBatches();
  } catch(e) { showToast(e.message, 'error'); }
}

function renderBatches(batches) {
  const c = document.getElementById('batch-list');
  if (batches.length === 0) {
    c.innerHTML = '<div class="text-gray-400 text-center py-12">暂无批次，点击右上角创建</div>';
    return;
  }
  c.innerHTML = batches.map(b => {
    const statusColors = {
      pending: 'bg-gray-100 text-gray-500',
      running: 'bg-blue-100 text-blue-700',
      completed: 'bg-green-100 text-green-700',
      failed: 'bg-red-100 text-red-700'
    };
    const statusLabels = { pending:'等待', running:'分析中', completed:'已完成', failed:'失败' };
    const sc = statusColors[b.status] || '';
    const sl = statusLabels[b.status] || b.status;
    const progress = b.total_count > 0 ? Math.round(b.completed_count / b.total_count * 100) : 0;

    return '<div class="bg-white rounded-lg shadow-sm border p-5 hover:shadow-md transition">' +
      '<div class="flex items-center justify-between">' +
        '<div class="flex items-center gap-4">' +
          '<a href="/batches/' + b.id + '" class="text-lg font-semibold text-gray-800 hover:text-blue-600">' + b.name + '</a>' +
          '<span class="tag ' + sc + '">' + sl + '</span>' +
        '</div>' +
        '<div class="flex items-center gap-2">' +
          (b.status === 'completed' ? '<button class="btn btn-ghost btn-sm" onclick="reanalyze(\'' + b.id + '\')">重新分析</button>' : '') +
          '<button class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="deleteBatch(\'' + b.id + '\')">删除</button>' +
        '</div>' +
      '</div>' +
      '<div class="mt-3 flex items-center gap-6 text-sm text-gray-500">' +
        '<span>共 ' + b.total_count + ' 只</span>' +
        '<span>已分析 ' + b.completed_count + '/' + b.total_count + '</span>' +
        '<span>已标注 ' + b.labeled_count + '/' + b.total_count + '</span>' +
        '<span>' + new Date(b.created_at).toLocaleString('zh-CN') + '</span>' +
      '</div>' +
      (b.status === 'running' ? '<div class="mt-3 bg-gray-200 rounded-full h-2"><div class="bg-blue-500 h-2 rounded-full transition-all" style="width:' + progress + '%"></div></div>' : '') +
    '</div>';
  }).join('');
}

async function loadBatches() {
  try {
    const batches = await api('/api/batches');
    renderBatches(batches);
    // 如果有 running 状态，轮询
    if (batches.some(b => b.status === 'running')) {
      setTimeout(loadBatches, 2000);
    }
  } catch(e) {
    document.getElementById('batch-list').innerHTML = '<div class="text-red-500 text-center py-12">加载失败: ' + e.message + '</div>';
  }
}

loadBatches();
</script>
{% endblock %}
